<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <!-- viewport-fit=cover критически важен для обработки отступов iPhone -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>OWOIND AI | НЕЙРОСЕТЬ</title>
    
    <link rel="icon" type="image/png" href="icon.png">
    
    <style>
        :root {
            --bg: #0e0e0e;
            --panel: #1a1a1a;
            --accent: #ffffff;
            --text: #ececec;
            --user-msg: #2d2d2d;
            --ai-msg: #1e1e1e;
            --radius: 20px;
            --border: rgba(255, 255, 255, 0.08);
        }

        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
            -webkit-tap-highlight-color: transparent; 
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        header {
            padding: 15px 20px;
            background: var(--panel);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: flex-start;
        }

        .logo { 
            font-size: 1.1rem; 
            font-weight: 900; 
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }
        .logo span { color: var(--accent); }

        #chat-window {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .message {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: var(--radius);
            font-size: 15px;
            line-height: 1.5;
            animation: slideUp 0.2s ease-out;
            word-wrap: break-word;
        }

        @keyframes slideUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; } }

        .user-message { 
            align-self: flex-end; 
            background: var(--user-msg); 
            border-bottom-right-radius: 4px;
            border: 1px solid var(--border);
        }

        .ai-message { 
            align-self: flex-start; 
            background: var(--ai-msg); 
            border: 1px solid var(--border);
            border-bottom-left-radius: 4px;
        }

        /* Область ввода — КРИТИЧЕСКИЙ БЛОК ДЛЯ IPHONE 16 */
        .input-area { 
            background: var(--panel); 
            padding: 12px 12px;
            /* Увеличиваем отступ снизу: env берет отступ системы + добавляем 60px сверху для подъема */
            padding-bottom: calc(env(safe-area-inset-bottom, 20px) + 60px); 
            border-top: 1px solid var(--border);
            position: relative;
            z-index: 100;
        }

        .input-box {
            max-width: 900px;
            margin: 0 auto;
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .control-btn {
            background: var(--ai-msg);
            border: 1px solid var(--border);
            width: 48px;
            height: 48px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .input-wrapper {
            flex: 1;
            background: #000;
            border-radius: 25px;
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            padding: 0 6px 0 16px;
            height: 48px;
        }

        input { 
            flex: 1; 
            background: transparent; 
            border: none; 
            color: #fff; 
            outline: none; 
            font-size: 16px; 
        }

        .send-btn {
            background: var(--accent);
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        @media (max-width: 768px) {
            .message { max-width: 92%; font-size: 14px; }
            header { padding: 12px 15px; }
        }
    </style>
</head>
<body>

<header>
    <div class="logo">OWOIND <span>AI</span></div>
</header>

<div id="chat-window">
    <div class="message ai-message">Привет! Я поднял поле ввода еще выше, чтобы на iPhone 16 всё работало идеально.</div>
</div>

<div class="input-area">
    <div class="input-box">
        <button class="control-btn" id="new-chat-btn">
            <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="#fff" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
        </button>
        
        <div class="input-wrapper">
            <input type="text" id="user-input" placeholder="Спроси что угодно..." autocomplete="off">
            <button class="send-btn" id="send-btn">
                <svg viewBox="0 0 24 24" width="18" height="18" fill="#000"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
            </button>
        </div>
    </div>
</div>

<script>
    const chat = document.getElementById('chat-window');
    const input = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-btn');
    const newChatBtn = document.getElementById('new-chat-btn');

    newChatBtn.onclick = () => {
        chat.innerHTML = '<div class="message ai-message">Чат очищен. Готов к вопросам!</div>';
    };

    async function handleAction() {
        const text = input.value.trim();
        if (!text) return;
        addMsg(text, 'user-message');
        input.value = "";
        const tempId = Date.now();
        addMsg("Думаю...", 'ai-message', null, tempId);
        const response = await processRequest(text);
        const temp = document.getElementById(tempId);
        if(temp) temp.remove();
        addMsg(response.text, 'ai-message', response.images);
    }

    async function processRequest(text) {
        try {
            if (text.toLowerCase().includes("нарисуй")) {
                const imgUrl = `https://image.pollinations.ai/prompt/${encodeURIComponent(text)}?nologo=true&seed=${Date.now()}`;
                return { text: "Готово:", images: [imgUrl] };
            }
            const res = await fetch(`https://text.pollinations.ai/${encodeURIComponent(text)}?model=openai`);
            const data = await res.text();
            return { text: data.replace(/ChatGPT|OpenAI/gi, "owoind") };
        } catch (e) {
            return { text: "Ошибка связи." };
        }
    }

    function addMsg(text, className, images = null, id = null) {
        const div = document.createElement('div');
        div.className = `message ${className}`;
        if(id) div.id = id;
        div.innerText = text;
        if (images) {
            const container = document.createElement('div');
            container.style.marginTop = "10px";
            images.forEach(src => {
                const img = document.createElement('img');
                img.src = src;
                img.style.width = "100%";
                img.style.borderRadius = "10px";
                container.appendChild(img);
            });
            div.appendChild(container);
        }
        chat.appendChild(div);
        chat.scrollTop = chat.scrollHeight;
    }

    sendBtn.onclick = handleAction;
    input.onkeypress = (e) => { if(e.key === 'Enter') handleAction(); };
</script>

</body>
</html>
